name: Weekly Meta Ads Intel - Publish

on:
  schedule:
    - cron: '7 7 * * 1'    # Monday 07:07 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate and publish new issue
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/publish_issue.py

      - name: Commit issues.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet issues.json; then
            echo "no changes to issues.json, skipping commit"
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          git add issues.json
          git commit -m "Auto-publish weekly issue $DATE"
          git push origin main

      - name: Purge jsDelivr CDN
        run: |
          curl -fsS -X POST "https://purge.jsdelivr.net/" \
            -H "Content-Type: application/json" \
            -d '{"path":["/gh/aleksamasic-biz/weekly-meta-intel@main/issues.json"]}' \
            && echo "" && echo "[cdn] purged"
